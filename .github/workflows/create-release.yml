name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'vx.y.z'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Use your PAT to ensure full access during build
          token: ${{ secrets.MY_RELEASE_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace || { echo "Gradle build failed"; exit 1; }

      - name: Set up Keystore
        run: |
          mkdir -p $RUNNER_TEMP/keystores
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > $RUNNER_TEMP/keystores/keystore.jks

      - name: Sign APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -n 1)
          APKSIGNER="${BUILD_TOOLS_DIR}apksigner"
          $APKSIGNER sign \
            --ks $RUNNER_TEMP/keystores/keystore.jks \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Clean Up Keystore
        if: always()
        run: rm -f $RUNNER_TEMP/keystores/keystore.jks

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-artifact
          path: app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Note: 'workflows' permission cannot be granted via this block for PATs, 
      # it must be set in the PAT settings itself.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # CRITICAL: Use the token here so the push step is authorized
          token: ${{ secrets.MY_RELEASE_TOKEN }}
          persist-credentials: true

      - name: Create Tag for Manual Trigger
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TAG_NAME="${{ github.event.inputs.release_tag }}"
          
          # Force the tag locally and push using the token URL
          git tag -f "$TAG_NAME"
          git push https://x-access-token:${{ secrets.MY_RELEASE_TOKEN }}@github.com/${{ github.repository }}.git "$TAG_NAME" --force

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: apk-artifact

      - name: Rename APK for Release
        run: |
          TAG_NAME="${{ github.event.inputs.release_tag || github.ref_name }}"
          mv app-release.apk "Nobook_${TAG_NAME}.apk"

      - name: Prepare Changelog
        run: |
          if [ ! -f CHANGE.md ]; then
            echo "Release ${{ github.ref_name || github.event.inputs.release_tag }}" > CHANGE.txt
          else
            cp CHANGE.md CHANGE.txt
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: Nobook_${{ github.event.inputs.release_tag || github.ref_name }}.apk
          body_path: CHANGE.txt
          # Uses the PAT for the release creation too
          token: ${{ secrets.MY_RELEASE_TOKEN }}
